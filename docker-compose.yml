services:
  db:
    image: postgres:16-alpine
    container_name: portal_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - portal_network

  web:
    build: .
    container_name: portal_web
    restart: unless-stopped
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn portal.wsgi:application --bind 0.0.0.0:8000 --workers 2 --timeout 60 --access-logfile - --error-logfile -"
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - portal_network
    volumes:
      - .:/app
      - static_files:/app/staticfiles

volumes:
  postgres_data:
  static_files:

networks:
  portal_network:
    driver: bridge
